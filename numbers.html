<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Numbers for Toddlers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }

        .title {
            font-size: 3rem;
            color: #ff6b6b;
            text-shadow: 3px 3px 0px #fff, 6px 6px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #4ecdc4;
            font-weight: bold;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .current-number {
            font-size: 8rem;
            color: #ff6b6b;
            font-weight: bold;
            margin: 30px 0;
            text-shadow: 5px 5px 0px #fff, 10px 10px 20px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        .objects-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 30px 0;
            min-height: 120px;
        }

        .object {
            width: 80px;
            height: 80px;
            font-size: 3rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .object:hover {
            transform: scale(1.2);
        }

        .object:nth-child(1) { animation-delay: 0s; background: #ffeb3b; }
        .object:nth-child(2) { animation-delay: 0.2s; background: #4caf50; }
        .object:nth-child(3) { animation-delay: 0.4s; background: #f44336; }
        .object:nth-child(4) { animation-delay: 0.6s; background: #2196f3; }
        .object:nth-child(5) { animation-delay: 0.8s; background: #ff9800; }
        .object:nth-child(6) { animation-delay: 1s; background: #9c27b0; }
        .object:nth-child(7) { animation-delay: 1.2s; background: #00bcd4; }
        .object:nth-child(8) { animation-delay: 1.4s; background: #8bc34a; }
        .object:nth-child(9) { animation-delay: 1.6s; background: #e91e63; }
        .object:nth-child(10) { animation-delay: 1.8s; background: #ffc107; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .game-mode-selector {
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .mode-btn.active {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            transform: scale(1.1);
        }

        .mode-btn:not(.active) {
            background: #e0e0e0;
            color: #666;
        }

        .balloon-game {
            position: relative;
            height: 400px;
            overflow: hidden;
            border-radius: 20px;
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
            margin: 20px 0;
        }

        .balloon {
            position: absolute;
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 100px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: float-balloon 4s ease-in-out infinite;
        }

        .balloon:hover {
            transform: scale(1.2);
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 30px;
            background: #333;
        }

        .balloon.popped {
            animation: pop 0.5s ease-out forwards;
        }

        .target-display {
            font-size: 2rem;
            color: #333;
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            border: 3px dashed #4caf50;
        }

        .score-display {
            font-size: 1.5rem;
            color: #ff6b6b;
            margin: 10px 0;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        @keyframes float-balloon {
            0% { transform: translateY(100vh) rotate(-5deg); }
            100% { transform: translateY(-120px) rotate(5deg); }
        }

        @keyframes pop {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 0.7; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-next {
            background: linear-gradient(45deg, #4caf50, #8bc34a);
            color: white;
        }

        .btn-prev {
            background: linear-gradient(45deg, #ff9800, #ffc107);
            color: white;
        }

        .btn-speak {
            background: linear-gradient(45deg, #2196f3, #03a9f4);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: confetti-fall 3s linear infinite;
        }

        .number-display {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @keyframes bounce {
            0%, 20%, 60%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            80% { transform: translateY(-5px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .title { font-size: 2rem; }
            .current-number { font-size: 5rem; }
            .object { width: 60px; height: 60px; font-size: 2rem; }
            .controls { flex-direction: column; align-items: center; }
            .btn { width: 200px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">🌟 Numbers Fun! 🌟</h1>
        <p class="subtitle">Let's learn numbers together!</p>
    </div>

    <div class="game-container">
        <div class="game-mode-selector">
            <button class="mode-btn active" id="learnBtn">📚 Learn Numbers</button>
            <button class="mode-btn" id="balloonBtn">🎈 Pop Balloons</button>
        </div>

        <!-- Learning Mode -->
        <div id="learningMode">
            <div class="number-display">
                <div class="current-number" id="currentNumber">1</div>
            </div>
            
            <div class="objects-container" id="objectsContainer">
                <!-- Objects will be generated here -->
            </div>

            <div class="controls">
                <button class="btn btn-prev" id="prevBtn">⬅️ Previous</button>
                <button class="btn btn-speak" id="speakBtn">🔊 Say Number</button>
                <button class="btn btn-next" id="nextBtn">➡️ Next</button>
            </div>
        </div>

        <!-- Balloon Game Mode -->
        <div id="balloonMode" class="hidden">
            <div class="target-display">
                🎯 Find and pop balloon number: <span id="targetNumber">3</span>
            </div>
            <div class="score-display">
                🌟 Score: <span id="score">0</span>
            </div>
            <div class="balloon-game" id="balloonGame">
                <!-- Balloons will fly here -->
            </div>
            <div class="controls">
                <button class="btn btn-speak" id="newGameBtn">🎈 New Game</button>
                <button class="btn btn-prev" id="pauseBtn">⏸️ Pause</button>
            </div>
        </div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
        class NumbersGame {
            constructor() {
                this.currentNumber = 1;
                this.maxNumber = 10;
                this.objects = ['🎈', '⭐', '🌸', '🦋', '🍎', '🎁', '🌈', '🦄', '🎨', '🎪'];
                this.colors = ['#ffeb3b', '#4caf50', '#f44336', '#2196f3', '#ff9800', '#9c27b0', '#00bcd4', '#8bc34a', '#e91e63', '#ffc107'];
                
                // Balloon game properties
                this.balloonGame = {
                    isActive: false,
                    targetNumber: 1,
                    score: 0,
                    balloons: [],
                    gameInterval: null,
                    balloonInterval: null,
                    isPaused: false
                };
                
                this.currentMode = 'learn';
                this.init();
            }

            init() {
                this.updateDisplay();
                this.attachEventListeners();
                this.speakNumber();
            }

            attachEventListeners() {
                // Mode switching
                document.getElementById('learnBtn').addEventListener('click', () => this.switchMode('learn'));
                document.getElementById('balloonBtn').addEventListener('click', () => this.switchMode('balloon'));

                // Learning mode events
                document.getElementById('nextBtn').addEventListener('click', () => this.nextNumber());
                document.getElementById('prevBtn').addEventListener('click', () => this.prevNumber());
                document.getElementById('speakBtn').addEventListener('click', () => this.speakNumber());
                
                // Balloon game events
                document.getElementById('newGameBtn').addEventListener('click', () => this.startBalloonGame());
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                
                // Touch/click on objects for interaction
                document.getElementById('objectsContainer').addEventListener('click', (e) => {
                    if (e.target.classList.contains('object')) {
                        this.celebrateClick(e.target);
                    }
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (this.currentMode === 'learn') {
                        if (e.key === 'ArrowRight' || e.key === ' ') this.nextNumber();
                        if (e.key === 'ArrowLeft') this.prevNumber();
                        if (e.key === 'Enter') this.speakNumber();
                    }
                });
            }

            switchMode(mode) {
                this.currentMode = mode;
                
                // Update button states
                document.getElementById('learnBtn').classList.toggle('active', mode === 'learn');
                document.getElementById('balloonBtn').classList.toggle('active', mode === 'balloon');
                
                // Show/hide appropriate sections
                document.getElementById('learningMode').classList.toggle('hidden', mode !== 'learn');
                document.getElementById('balloonMode').classList.toggle('hidden', mode !== 'balloon');
                
                if (mode === 'balloon') {
                    this.startBalloonGame();
                } else {
                    this.stopBalloonGame();
                }
            }

            startBalloonGame() {
                this.stopBalloonGame(); // Clean up any existing game
                
                this.balloonGame.isActive = true;
                this.balloonGame.isPaused = false;
                this.balloonGame.targetNumber = Math.floor(Math.random() * 10) + 1;
                this.balloonGame.balloons = [];
                
                document.getElementById('targetNumber').textContent = this.balloonGame.targetNumber;
                document.getElementById('pauseBtn').textContent = '⏸️ Pause';
                
                this.speakTargetNumber();
                this.createBalloons();
                
                // Start balloon creation interval
                this.balloonGame.balloonInterval = setInterval(() => {
                    if (!this.balloonGame.isPaused) {
                        this.createRandomBalloon();
                    }
                }, 2000);
            }

            stopBalloonGame() {
                this.balloonGame.isActive = false;
                this.balloonGame.isPaused = false;
                
                if (this.balloonGame.balloonInterval) {
                    clearInterval(this.balloonGame.balloonInterval);
                    this.balloonGame.balloonInterval = null;
                }
                
                // Clear all balloons
                const gameArea = document.getElementById('balloonGame');
                gameArea.innerHTML = '';
                this.balloonGame.balloons = [];
            }

            togglePause() {
                if (!this.balloonGame.isActive) return;
                
                this.balloonGame.isPaused = !this.balloonGame.isPaused;
                document.getElementById('pauseBtn').textContent = this.balloonGame.isPaused ? '▶️ Resume' : '⏸️ Pause';
                
                const balloons = document.querySelectorAll('.balloon');
                balloons.forEach(balloon => {
                    balloon.style.animationPlayState = this.balloonGame.isPaused ? 'paused' : 'running';
                });
            }

            createBalloons() {
                // Create initial set of balloons
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => this.createRandomBalloon(), i * 1000);
                }
            }

            createRandomBalloon() {
                if (!this.balloonGame.isActive || this.balloonGame.isPaused) return;
                
                const gameArea = document.getElementById('balloonGame');
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                
                // Random number 1-10
                const number = Math.floor(Math.random() * 10) + 1;
                balloon.textContent = number;
                balloon.dataset.number = number;
                
                // Random color
                const color = this.colors[Math.floor(Math.random() * this.colors.length)];
                balloon.style.background = `linear-gradient(45deg, ${color}, ${this.lightenColor(color, 20)})`;
                
                // Random horizontal position
                balloon.style.left = Math.random() * (gameArea.offsetWidth - 80) + 'px';
                
                // Random animation duration (3-6 seconds)
                const duration = 3 + Math.random() * 3;
                balloon.style.animationDuration = duration + 's';
                
                // Add click event
                balloon.addEventListener('click', (e) => this.popBalloon(e.target));
                
                gameArea.appendChild(balloon);
                this.balloonGame.balloons.push(balloon);
                
                // Remove balloon after animation completes
                setTimeout(() => {
                    if (balloon.parentNode) {
                        balloon.remove();
                        const index = this.balloonGame.balloons.indexOf(balloon);
                        if (index > -1) {
                            this.balloonGame.balloons.splice(index, 1);
                        }
                    }
                }, duration * 1000 + 500);
            }

            popBalloon(balloon) {
                if (!this.balloonGame.isActive || balloon.classList.contains('popped')) return;
                
                const balloonNumber = parseInt(balloon.dataset.number);
                balloon.classList.add('popped');
                
                if (balloonNumber === this.balloonGame.targetNumber) {
                    // Correct balloon!
                    this.balloonGame.score += 10;
                    document.getElementById('score').textContent = this.balloonGame.score;
                    
                    // Celebrate with confetti
                    this.showBalloonCelebration();
                    
                    // Speak the number
                    this.speakNumber(balloonNumber);
                    
                    // Generate new target after delay
                    setTimeout(() => {
                        if (this.balloonGame.isActive) {
                            this.balloonGame.targetNumber = Math.floor(Math.random() * 10) + 1;
                            document.getElementById('targetNumber').textContent = this.balloonGame.targetNumber;
                            this.speakTargetNumber();
                        }
                    }, 2000);
                } else {
                    // Wrong balloon - just pop it
                    this.speakNumber(balloonNumber);
                }
                
                // Remove balloon after pop animation
                setTimeout(() => {
                    if (balloon.parentNode) {
                        balloon.remove();
                        const index = this.balloonGame.balloons.indexOf(balloon);
                        if (index > -1) {
                            this.balloonGame.balloons.splice(index, 1);
                        }
                    }
                }, 500);
            }

            lightenColor(color, percent) {
                const num = parseInt(color.replace("#",""), 16);
                const amt = Math.round(2.55 * percent);
                const R = (num >> 16) + amt;
                const G = (num >> 8 & 0x00FF) + amt;
                const B = (num & 0x0000FF) + amt;
                return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
            }

            speakTargetNumber() {
                if ('speechSynthesis' in window) {
                    setTimeout(() => {
                        const utterance = new SpeechSynthesisUtterance();
                        utterance.text = `Find number ${this.balloonGame.targetNumber}`;
                        utterance.rate = 0.8;
                        utterance.pitch = 1.2;
                        utterance.volume = 1;
                        speechSynthesis.speak(utterance);
                    }, 500);
                }
            }

            showBalloonCelebration() {
                const celebration = document.getElementById('celebration');
                celebration.innerHTML = '';
                
                // Create more confetti for correct answer
                for (let i = 0; i < 30; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = this.colors[Math.floor(Math.random() * this.colors.length)];
                    confetti.style.animationDelay = Math.random() * 2 + 's';
                    celebration.appendChild(confetti);
                }
                
                // Add celebration sound effect
                if ('speechSynthesis' in window) {
                    setTimeout(() => {
                        const utterance = new SpeechSynthesisUtterance();
                        utterance.text = `Great job! You found ${this.balloonGame.targetNumber}!`;
                        utterance.rate = 0.9;
                        utterance.pitch = 1.3;
                        utterance.volume = 1;
                        speechSynthesis.speak(utterance);
                    }, 300);
                }
                
                setTimeout(() => {
                    celebration.innerHTML = '';
                }, 4000);
            }

            nextNumber() {
                if (this.currentNumber < this.maxNumber) {
                    this.currentNumber++;
                } else {
                    this.currentNumber = 1; // Loop back to 1
                }
                this.updateDisplay();
                this.speakNumber();
                this.showCelebration();
            }

            prevNumber() {
                if (this.currentNumber > 1) {
                    this.currentNumber--;
                } else {
                    this.currentNumber = this.maxNumber; // Loop to max
                }
                this.updateDisplay();
                this.speakNumber();
            }

            updateDisplay() {
                // Update number display
                document.getElementById('currentNumber').textContent = this.currentNumber;
                
                // Update objects
                const container = document.getElementById('objectsContainer');
                container.innerHTML = '';
                
                for (let i = 0; i < this.currentNumber; i++) {
                    const objectDiv = document.createElement('div');
                    objectDiv.className = 'object';
                    objectDiv.style.backgroundColor = this.colors[i % this.colors.length];
                    objectDiv.textContent = this.objects[i % this.objects.length];
                    objectDiv.style.animationDelay = `${i * 0.2}s`;
                    container.appendChild(objectDiv);
                }

                // Update button states
                document.getElementById('prevBtn').style.opacity = '1';
                document.getElementById('nextBtn').style.opacity = '1';
            }

            speakNumber(number = null) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance();
                    const numToSpeak = number || this.currentNumber;
                    utterance.text = `${numToSpeak}`;
                    utterance.rate = 0.8;
                    utterance.pitch = 1.2;
                    utterance.volume = 1;
                    speechSynthesis.speak(utterance);
                }
            }

            celebrateClick(element) {
                // Add click animation
                element.style.transform = 'scale(1.5)';
                element.style.transition = 'transform 0.3s ease';
                
                setTimeout(() => {
                    element.style.transform = 'scale(1)';
                }, 300);

                // Play sound effect (visual feedback)
                this.createRipple(element);
                
                // Speak the object
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance();
                    utterance.text = `${element.textContent}`;
                    utterance.rate = 1;
                    utterance.pitch = 1.3;
                    speechSynthesis.speak(utterance);
                }
            }

            createRipple(element) {
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.background = 'rgba(255, 255, 255, 0.6)';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'ripple 0.6s linear';
                ripple.style.left = '50%';
                ripple.style.top = '50%';
                ripple.style.width = '100px';
                ripple.style.height = '100px';
                ripple.style.marginLeft = '-50px';
                ripple.style.marginTop = '-50px';
                ripple.style.pointerEvents = 'none';
                
                element.style.position = 'relative';
                element.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            }

            showCelebration() {
                const celebration = document.getElementById('celebration');
                celebration.innerHTML = '';
                
                for (let i = 0; i < 20; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = this.colors[Math.floor(Math.random() * this.colors.length)];
                    confetti.style.animationDelay = Math.random() * 3 + 's';
                    celebration.appendChild(confetti);
                }
                
                setTimeout(() => {
                    celebration.innerHTML = '';
                }, 3000);
            }
        }

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        // Start the game when page loads
        window.addEventListener('load', () => {
            new NumbersGame();
        });
    </script>
</body>
</html>
